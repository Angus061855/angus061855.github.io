<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AS娛樂經紀 | 大頭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161616;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', 'PingFang TC', serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* NOISE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }

    .nav-logo img {
      height: 36px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: color 0.3s;
      font-family: 'Noto Serif TC', serif;
    }

    .nav-links a:hover { color: var(--gold); }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    }

    .hero-tag {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 3px;
      padding: 6px 18px;
      border-radius: 999px;
      margin-bottom: 36px;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #hero h1 {
      font-size: clamp(2.4rem, 6.5vw, 4.6rem);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 2px;
      margin-bottom: 32px;
      font-family: 'Noto Serif TC', serif;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease infinite 1.4s;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 打字機游標 */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--gold);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 48px;
      line-height: 2;
      font-family: 'Noto Serif TC', serif;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    .hero-sub strong {
      color: var(--text);
      font-weight: 700;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0a0a0a;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 40px;
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(201,168,76,0.3);
      font-family: 'Noto Serif TC', serif;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 60px rgba(201,168,76,0.55);
    }

    .hero-stats {
      display: flex;
      gap: 56px;
      margin-top: 80px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
    }

    .stat { text-align: center; }

    .stat-num {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      display: block;
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 1px;
      font-family: 'Noto Serif TC', serif;
      margin-top: 4px;
    }

    /* 分隔線 */
    .stat-divider {
      width: 1px;
      background: rgba(201,168,76,0.2);
      align-self: stretch;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="LOGO 白色.png" alt="AS娛樂經紀" />
    </div>
    <ul class="nav-links">
      <li><a href="#">關於我們</a></li>
      <li><a href="#">服務項目</a></li>
      <li><a href="#">聯絡我們</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-glow"></div>

    <div class="hero-tag">AS 娛樂經紀 · 大頭</div>

    <h1>
      不要讓未來的你，<br>
      <span id="typed-text"></span><span class="cursor" id="cursor"></span>
    </h1>

    <p class="hero-sub">
      你值得更好的選擇。<br>
      我幫你把時間變成真正的收入，讓每一個決定都值得。
    </p>

    <a class="btn-primary" href="https://line.me" target="_blank">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
      </svg>
      免費諮詢，現在加入
    </a>

    <div class="hero-stats">
      <div class="stat">
        <span class="stat-num" data-target="3" data-suffix="–5x">0</span>
        <span class="stat-label">一般上班族薪資</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" data-target="0" data-suffix="彈性">彈性</span>
        <span class="stat-label">自由排班</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" data-target="0" data-suffix="當天">當天</span>
        <span class="stat-label">現領薪資</span>
      </div>
    </div>
  </section>

  <script>
    // ── 打字機效果 ──
    const text = "討厭現在的自己";
    const el   = document.getElementById("typed-text");
    const cur  = document.getElementById("cursor");
    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 120);
      } else {
        // 打完後游標繼續閃，不消失
      }
    }

    // 等 h1 淡入後再開始打字
    setTimeout(type, 1400);

    // ── 數字跳動計數器 ──
    function animateCounter(el, target, duration, suffix) {
      let start = 0;
      const step = target / (duration / 16);
      const timer = setInterval(() => {
        start += step;
        if (start >= target) {
          start = target;
          clearInterval(timer);
        }
        if (suffix === "–5x") {
          el.textContent = Math.floor(start) + "–5x";
        } else {
          el.textContent = suffix;
        }
      }, 16);
    }

    // 用 IntersectionObserver 觸發
    const statsEl = document.querySelector('.hero-stats');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          // 3-5x 計數
          const numEl = document.querySelector('[data-suffix="–5x"]');
          animateCounter(numEl, 3, 1200, "–5x");
          observer.disconnect();
        }
      });
    }, { threshold: 0.5 });

    observer.observe(statsEl);
  </script>

</body>
</html>
