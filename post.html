  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

    .title {

    }
    .cover { width: 100%; border-radius: 12px; margin-bottom: 2rem; object-fit: cover; max-height: 400px; display: none; }
    .body { font-size: 1rem; line-height: 2; color: #ccc; }
    .body p { margin-bottom: 1.5em; word-break: keep-all; overflow-wrap: break-word; }
    .body h2 {

    .float-line {

      color: rgba(255,255,255,0.92); font-weight: 700; font-size: 0.88rem;
      padding: 11px 22px; border-radius: 999px; text-decoration: none;

      box-shadow: 0 4px 20px rgba(26,107,69,0.35), inset 0 1px 0 rgba(255,255,255,0.08);

    }
    .float-line:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(26,107,69,0.5); }
    .float-line-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.7); border-radius: 50%; }

    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 0.85rem; }
    footer span { color: var(--accent); }

    @media (max-width: 640px) {

<body>

<a href="https://line.me/ti/p/tTUQTPHKrE" target="_blank" rel="noopener noreferrer" class="float-line">

</a>

<nav>

  </a>
  <a href="/blog.html" class="back-btn">← 返回部落格</a>
</nav>

<div class="wrap">
  <div class="state" id="loading">載入中...</div>
  <div id="content" style="display:none">
    <div class="meta">
      <span id="meta"></span>
      <span class="views"><span id="views">0</span> 次瀏覽</span>
    </div>
    <h1 class="title" id="title"></h1>
    <p class="summary" id="summary"></p>
    <img class="cover" id="cover" alt="封面"/>
    <div class="body" id="body"></div>
  </div>
  <div class="state error" id="error" style="display:none">
    找不到這篇文章<br/>
    <a href="/blog.html" style="color:var(--accent);margin-top:12px;display:inline-block;">← 返回部落格</a>
  </div>
</div>

<footer>
  <p>© 2026 <span>AS娛樂</span>　八大最誠實經紀 大頭</p>
</footer>

<script>
  const WORKER = 'https://polished-truth-9fc2.angus061855.workers.dev';

  function getBaseViews(slug) {
    let hash = 0;
    for (let i = 0; i < slug.length; i++) hash = (hash * 31 + slug.charCodeAt(i)) & 0xffffffff;
    return 1235 + (Math.abs(hash) % (4257 - 1235 + 1));
  }
  function getDailyAdd(slug, days) {
    let total = 0;
    for (let i = 0; i < days; i++) {
      let seed = 0; const s = slug + i;
      for (let j = 0; j < s.length; j++) seed = (seed * 31 + s.charCodeAt(j)) & 0xffffffff;
      total += 543 + (Math.abs(seed) % 701);
    }
    return total;
  }
  function calcViews(slug, publishDate) {
    const pub = new Date(publishDate); const today = new Date();
    const days = Math.max(0, Math.floor((today - pub) / (1000 * 60 * 60 * 24)));
    return (getBaseViews(slug) + getDailyAdd(slug, days)).toLocaleString();
  }

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { showError(); return; }
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4500);
      const res = await fetch(`${WORKER}/posts/${slug}`, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) throw new Error();
      const post = await res.json();

      document.title = `${post.title}｜AS娛樂 大頭`;
      const postUrl = `https://as-ent-tw.com/post.html?slug=${slug}`;

      // 動態注入文章結構化資料
      const schema = document.createElement('script');
      schema.type = 'application/ld+json';
      schema.text = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": post.title,
        "description": post.summary || '',
        "datePublished": post.date,
        "author": { "@type": "Person", "name": "大頭", "jobTitle": "八大行業經紀人", "url": "https://as-ent-tw.com" },
        "publisher": { "@type": "Organization", "name": "AS娛樂", "url": "https://as-ent-tw.com" },
        "mainEntityOfPage": { "@type": "WebPage", "@id": postUrl }
      });
      document.head.appendChild(schema);

      const breadcrumb = document.createElement('script');
      breadcrumb.type = 'application/ld+json';
      breadcrumb.text = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {"@type":"ListItem","position":1,"name":"首頁","item":"https://as-ent-tw.com/"},
          {"@type":"ListItem","position":2,"name":"部落格","item":"https://as-ent-tw.com/blog.html"},
          {"@type":"ListItem","position":3,"name":post.title,"item":postUrl}
        ]
      });
      document.head.appendChild(breadcrumb);

      // 動態更新 meta
      document.querySelector('meta[name="description"]').setAttribute('content', post.summary || post.title);
      document.querySelector('link[rel="canonical"]').setAttribute('href', postUrl);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `${post.title}｜AS娛樂 大頭`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', post.summary || post.title);
      document.querySelector('meta[property="og:url"]').setAttribute('content', postUrl);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${post.title}｜AS娛樂 大頭`);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', post.summary || post.title);

      document.getElementById('meta').textContent = post.date;
      document.getElementById('views').textContent = calcViews(slug, post.date);
      document.getElementById('title').textContent = post.title;
      document.getElementById('summary').textContent = post.summary || '';

      const bodyEl = document.getElementById('body');
      const lines = (post.body || '').split('\n');
      let html = '';
      for (const line of lines) {
        const t = line.trim();
        if (!t) { html += '<div style="height:0.5em"></div>'; continue; }
        if (t.match(/^\d+\./)) {
          html += `<p class="list-item">${t}</p>`;
        } else if (t.length <= 25 && !t.endsWith('。') && !t.endsWith('，') && !t.endsWith('、') && !t.match(/^\d/)) {
          html += `<h2>${t}</h2>`;
        } else {
          html += `<p>${t}</p>`;
        }
      }
      bodyEl.innerHTML = html;

      if (post.cover) {
        const img = document.getElementById('cover');
        img.src = post.cover;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.style.display = 'block';
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch { showError(); }
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }

  loadPost();

  (function() {
    const canvas = document.getElementById('velvet-bg');
    const ctx = canvas.getContext('2d');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    canvas.style.position = 'fixed'; canvas.style.top = '0'; canvas.style.left = '0';
    canvas.style.width = '100%'; canvas.style.height = '100%';
    canvas.style.zIndex = '-1'; canvas.style.pointerEvents = 'none';
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let t = 0;
    const folds = [
      { x: 0.15, y: 0.10, tx: 0.75, ty: 0.55, speed: 0.00002, phase: 0.0 },
      { x: 0.05, y: 0.40, tx: 0.60, ty: 0.90, speed: 0.00002, phase: 1.2 },
      { x: 0.30, y: 0.00, tx: 0.95, ty: 0.70, speed: 0.00002, phase: 2.4 },
    ];
    function drawFold(fold, time) {
      const drift = Math.sin(time * fold.speed * 1000 + fold.phase) * 0.06;
      const x1 = (fold.x + drift) * W, y1 = (fold.y + drift * 0.5) * H;
      const x2 = (fold.tx - drift) * W, y2 = (fold.ty - drift * 0.3) * H;
      const len = Math.hypot(x2 - x1, y2 - y1);
      const nx = -(y2 - y1) / len, ny = (x2 - x1) / len;
      const w = Math.max(W, H) * (0.28 + Math.sin(time * fold.speed * 800 + fold.phase) * 0.04);
      const grad = ctx.createLinearGradient(x1 + nx * w, y1 + ny * w, x1 - nx * w, y1 - ny * w);
      grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(0.35, 'rgba(0,0,0,0)');
      grad.addColorStop(0.48, 'rgba(72,70,68,0.08)'); grad.addColorStop(0.50, 'rgba(95,92,88,0.13)');
      grad.addColorStop(0.52, 'rgba(72,70,68,0.08)'); grad.addColorStop(0.65, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save(); ctx.beginPath();
      const ex = (x2-x1)/len, ey = (y2-y1)/len, ext = Math.max(W,H)*2.0;
      ctx.moveTo(x1-ex*ext+nx*w, y1-ey*ext+ny*w); ctx.lineTo(x2+ex*ext+nx*w, y2+ey*ext+ny*w);
      ctx.lineTo(x2+ex*ext-nx*w, y2+ey*ext-ny*w); ctx.lineTo(x1-ex*ext-nx*w, y1-ey*ext-ny*w);
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill(); ctx.restore();
    }
    const bumps = [
      { x: 0.55, y: 0.35, r: 0.42, speed: 0.000002, phase: 0.0 },
      { x: 0.25, y: 0.65, r: 0.35, speed: 0.000002, phase: 1.8 },
      { x: 0.75, y: 0.75, r: 0.30, speed: 0.000002, phase: 3.2 },
    ];
    function drawBump(bump, time) {
      const drift = Math.sin(time * bump.speed * 1000 + bump.phase);
      const cx = (bump.x + drift * 0.07) * W;
      const cy = (bump.y + Math.cos(time * bump.speed * 800 + bump.phase) * 0.06) * H;
      const r = bump.r * Math.max(W, H);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, 'rgba(88,85,80,0.20)'); grad.addColorStop(0.25, 'rgba(65,62,58,0.14)');
      grad.addColorStop(0.55, 'rgba(30,28,26,0.07)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    }
    function draw() {
      t++; ctx.fillStyle = '#060606'; ctx.fillRect(0, 0, W, H);
      if (!reduceMotion) {
        bumps.forEach(b => drawBump(b, t)); folds.forEach(f => drawFold(f, t));
      }
      const vignette = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.45, Math.max(W,H)*0.78);
      vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(0.55, 'rgba(0,0,0,0.18)');
      vignette.addColorStop(0.80, 'rgba(0,0,0,0.55)'); vignette.addColorStop(1, 'rgba(0,0,0,0.85)');
      ctx.fillStyle = vignette; ctx.fillRect(0, 0, W, H);
      if (!document.hidden) requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
</body>
