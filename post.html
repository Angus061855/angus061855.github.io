  Object.assign(LOCAL_POSTS, window.AS_VOICE_POSTS || {});

  function getBaseViews(slug) { let h=0; for(let i=0;i<slug.length;i++) h=(h*31+slug.charCodeAt(i))&0xffffffff; return 1235+(Math.abs(h)%(4257-1235+1)); }
  function getDailyAdd(slug, days) { let t=0; for(let i=0;i<days;i++){let s=0,str=slug+i; for(let j=0;j<str.length;j++) s=(s*31+str.charCodeAt(j))&0xffffffff; t+=543+(Math.abs(s)%701);} return t; }
  function calcViews(slug, publishDate) { const pub=new Date(publishDate),today=new Date(),days=Math.max(0,Math.floor((today-pub)/(1000*60*60*24))); return (getBaseViews(slug)+getDailyAdd(slug,days)).toLocaleString(); }
  function setTotalViews() {
    const startDate = new Date('2026-03-01');
    const startCount = 28547;
    const today = new Date();
    const days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
    let total = startCount;
    for (let i = 0; i < days; i++) total += 543 + (((i * 7919) + 3571) % 701);
    document.querySelectorAll('[data-total-views]').forEach(el => { el.textContent = total.toLocaleString(); });
  }
  setTotalViews();

  const INTERNAL_LINKS = {
    '了解目前職缺': 'https://as-ent-tw.com/#jobs',
    '了解目前職缺：': 'https://as-ent-tw.com/#jobs',
    '先看常見問題': 'https://as-ent-tw.com/#faq',
    '先看常見問題：': 'https://as-ent-tw.com/#faq',
    '看更多八大文章': 'https://as-ent-tw.com/blog.html',
    '看更多八大文章：': 'https://as-ent-tw.com/blog.html',
    '直接聯絡諮詢': 'https://as-ent-tw.com/#contact',
    '直接聯絡諮詢：': 'https://as-ent-tw.com/#contact'
  };

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function cleanDisplayText(text) {
    return String(text || '')
      .replace(/[，、。]/g, '　')
      .replace(/　{2,}/g, '　')
      .replace(/　([？?！!])/g, '$1')
      .trim();
  }

  function setMetaContent(selector, content) {
    const element = document.querySelector(selector);
    if (element) element.setAttribute('content', content);
  }
  function absoluteAssetUrl(url) {
    if (!url) return 'https://as-ent-tw.com/og-image.jpg';
    try { return new URL(url, 'https://as-ent-tw.com/').href; }
    catch { return 'https://as-ent-tw.com/og-image.jpg'; }
  }
  function updatePostSeo(post, slug) {
    const title = cleanDisplayText(post.title);
    const description = cleanDisplayText(post.summary || post.title);
    const postUrl = `https://as-ent-tw.com/post/${encodeURIComponent(slug)}`;
    const imageUrl = absoluteAssetUrl(post.cover);

    document.title = `${title}｜AS娛樂 大頭`;
    document.querySelector('meta[name="robots"]').setAttribute('content', 'index, follow');
    document.querySelector('link[rel="canonical"]').setAttribute('href', postUrl);
    document.querySelectorAll('link[rel="alternate"]').forEach(link => link.setAttribute('href', postUrl));
    setMetaContent('meta[name="description"]', description);
    setMetaContent('meta[property="og:title"]', `${title}｜AS娛樂 大頭`);
    setMetaContent('meta[property="og:description"]', description);
    setMetaContent('meta[property="og:url"]', postUrl);
    setMetaContent('meta[property="og:image"]', imageUrl);
    setMetaContent('meta[name="twitter:title"]', `${title}｜AS娛樂 大頭`);
    setMetaContent('meta[name="twitter:description"]', description);
    setMetaContent('meta[name="twitter:image"]', imageUrl);

    document.querySelectorAll('script[data-dynamic-schema]').forEach(script => script.remove());
    const schemas = [
      {
        '@context':'https://schema.org',
        '@type':'BlogPosting',
        headline:title,
        image:[imageUrl],
        datePublished:post.date,
        author:{ '@type':'Person', name:'大頭', url:'https://as-ent-tw.com/about.html' },
        publisher:{
          '@type':'Organization',
          name:'AS娛樂',
          url:'https://as-ent-tw.com/',
          logo:{ '@type':'ImageObject', url:'https://as-ent-tw.com/logo.png' }
        },
        description,
        url:postUrl,
        mainEntityOfPage:{ '@type':'WebPage', '@id':postUrl }
      },
      {
        '@context':'https://schema.org',
        '@type':'BreadcrumbList',
        itemListElement:[
          { '@type':'ListItem', position:1, name:'首頁', item:'https://as-ent-tw.com/' },
          { '@type':'ListItem', position:2, name:'部落格', item:'https://as-ent-tw.com/blog.html' },
          { '@type':'ListItem', position:3, name:title }
        ]
      }
    ];
    schemas.forEach(data => {
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.dataset.dynamicSchema = 'true';
      script.textContent = JSON.stringify(data);
      document.head.appendChild(script);
    });
  }

  function linkifyText(text) {
    const trimmed = text.trim();
    const normalized = trimmed.replace(/[：:]\s*$/, '');
    if (INTERNAL_LINKS[trimmed] || INTERNAL_LINKS[normalized]) {
      const url = INTERNAL_LINKS[trimmed] || INTERNAL_LINKS[normalized];
      return `<a class="related-link" href="${url}" target="_blank" rel="noopener noreferrer">${escapeHtml(normalized)}</a>`;
    }

    const labelUrl = trimmed.match(/^(.+?)[：:]\s*(https?:\/\/\S+)$/);
    if (labelUrl) {
      const label = labelUrl[1].trim();
      const url = labelUrl[2].trim();
      return `<a class="related-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
    }

    return escapeHtml(cleanDisplayText(text)).replace(/https?:\/\/[^\s，。)）]+/g, (url) => {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function renderLocalPost(post, slug) {
    updatePostSeo(post, slug);

    document.getElementById('meta').textContent = post.date;
    document.getElementById('views').textContent = calcViews(slug, post.date);
    document.getElementById('title').textContent = cleanDisplayText(post.title);
    document.getElementById('summary').textContent = cleanDisplayText(post.summary || '');

    const bodyEl = document.getElementById('body');
    const lines = (post.body || '').split('\n');
    let html = '';
    let paragraphLines = [];
    const flushParagraph = () => {
      if (!paragraphLines.length) return;
      html += `<p>${paragraphLines.join('<br>')}</p>`;
      paragraphLines = [];
    };
    for (const line of lines) {
      const raw = line.trim();
      const isHeading = raw.startsWith('## ');
      const t = cleanDisplayText(isHeading ? raw.slice(3) : raw);
      if (!t) {
        flushParagraph();
        html += '<div style="height:0.5em"></div>';
        continue;
      }
      const linked = linkifyText(t);
      if (isHeading) {
        flushParagraph();
        html += `<h2>${linked}</h2>`;
      } else if (t.match(/^\d+\./)) {
        flushParagraph();
        html += `<p class="list-item">${linked}</p>`;
      } else {
        paragraphLines.push(linked);
      }
    }
    flushParagraph();
    bodyEl.innerHTML = html;

    const img = document.getElementById('cover');
    if (post.cover) {
      img.src = post.cover;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.style.display = 'block';
    } else {
      img.removeAttribute('src');
      img.style.display = 'none';
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('error').style.display = 'none';
  }

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { showError(); return; }
    const cached = readPostCache(slug);
    let hasRendered = false;
    if (LOCAL_POSTS[slug]) {
      renderLocalPost(LOCAL_POSTS[slug], slug);
      hasRendered = true;
    } else if (cached?.data) {
      renderLocalPost(cached.data, slug);
      hasRendered = true;
    }
    if (window.AS_VOICE_POSTS?.[slug]) return;
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), hasRendered ? 2500 : 3500);
      const res = await fetch(`${WORKER}/posts/${slug}`, { signal: controller.signal, cache:'force-cache' });
      clearTimeout(timeout);
      if (!res.ok) throw new Error();
      const post = await res.json();
      writePostCache(slug, post);
      renderLocalPost(post, slug);
    } catch {
      if (hasRendered) return;
      if (LOCAL_POSTS[slug]) {
        renderLocalPost(LOCAL_POSTS[slug], slug);
        return;
      }
      showError();
    }
  }

  function showError() {
    document.title = '找不到文章｜AS娛樂 大頭';
    document.querySelector('meta[name="robots"]').setAttribute('content', 'noindex, follow');
    document.querySelector('link[rel="canonical"]').setAttribute('href', 'https://as-ent-tw.com/blog.html');
    setMetaContent('meta[name="description"]', '這篇文章可能已經移動或暫時下架，請查看其他八大求職知識與文章。');
    document.querySelectorAll('script[data-dynamic-schema]').forEach(script => script.remove());
    const recommendations = Object.values(LOCAL_POSTS)
      .sort((a, b) => String(b.date).localeCompare(String(a.date)) || String(b.slug).localeCompare(String(a.slug)))
      .filter(post => post.slug)
      .slice(0, 3);
    document.getElementById('error-recommendations').innerHTML = recommendations.map(post => `
      <a class="error-recommendation" href="post.html?slug=${encodeURIComponent(post.slug)}">
        <time datetime="${escapeHtml(post.date)}">${escapeHtml(post.date)}</time>
        <strong>${escapeHtml(cleanDisplayText(post.title))}</strong>
      </a>
    `).join('');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }

  loadPost();

</script>
