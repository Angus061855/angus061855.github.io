<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="keywords" content="酒店經紀,八大經紀,台北酒店公關,酒店打工,兼職,酒店經紀人推薦"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://as-ent-tw.com/"/>
  <meta property="og:title" content="AS娛樂｜八大最誠實經紀 大頭"/>
  <meta property="og:description" content="不簽合約、不壓薪水、自由排班。七年經驗，3000位面試，最透明的經紀人。"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://as-ent-tw.com/"/>
  <meta property="og:image" content="https://as-ent-tw.com/og-image.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #141414;
      --border: #2a2a2a; --text: #f0f0f0;
      --muted: #888; --accent: #c8a96e; --accent2: #e0c080;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; line-height: 1.8; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 40px; background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-logo img { height: 40px; width: auto; display: block; }
    .nav-logo span { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.18em; color: #ffffff; font-family: 'Noto Serif TC', serif; }
    .back-btn { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .back-btn:hover { color: var(--accent); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 120px 24px 80px; }
    .meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.05em; }
    .title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: var(--accent); line-height: 1.3; margin-bottom: 12px; }
    .summary { font-size: 1rem; color: var(--muted); padding-bottom: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); line-height: 1.9; }
    .cover { width: 100%; border-radius: 12px; margin-bottom: 2rem; object-fit: cover; max-height: 400px; display: none; }
    .body { font-size: 1rem; line-height: 1.9; color: #ccc; }
    .body p { margin-bottom: 1.4em; }
    .body h2 { font-size: 1.25rem; font-weight: 800; color: var(--accent); margin: 2.2em 0 0.7em; letter-spacing: 0.04em; padding-bottom: 0.4em; border-bottom: 1px solid var(--border); }
    .body .list-item { padding-left: 1em; margin-bottom: 0.7em; color: #ccc; }
    .state { text-align: center; padding: 4rem; color: var(--muted); font-size: 1rem; }
    .error { color: #e05555; }
    .float-line {
      position: fixed; bottom: 28px; right: 24px; z-index: 200;
      display: flex; align-items: center; gap: 10px;
      background: #06C755; color: #fff; font-weight: 700; font-size: 0.9rem;
      padding: 12px 20px; border-radius: 999px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(6,199,85,0.4); transition: transform 0.2s, box-shadow 0.2s;
    }
    .float-line:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(6,199,85,0.5); }
    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 0.85rem; }
    footer span { color: var(--accent); }
    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      .wrap { padding: 100px 20px 60px; }
    }
  </style>
</head>
<body>

<a href="https://line.me/ti/p/tTUQTPHKrE" target="_blank" class="float-line">
  💬　立即加 LINE
</a>

<nav>
  <a href="https://as-ent-tw.com" class="nav-logo">
    <img src="/logo.png" alt="AS娛樂"/>
    <span>AS娛樂</span>
  </a>
  <a href="/blog.html" class="back-btn">← 返回部落格</a>
</nav>

<div class="wrap">
  <div class="state" id="loading">載入中...</div>
  <div id="content" style="display:none">
    <div class="meta" id="meta"></div>
    <h1 class="title" id="title"></h1>
    <p class="summary" id="summary"></p>
    <img class="cover" id="cover" alt="封面"/>
    <div class="body" id="body"></div>
  </div>
  <div class="state error" id="error" style="display:none">
    找不到這篇文章 😢<br/>
    <a href="/blog.html" style="color:var(--accent);margin-top:12px;display:inline-block;">← 返回部落格</a>
  </div>
</div>

<footer>
  <p>© 2026 <span>AS娛樂</span>　八大最誠實經紀 大頭</p>
</footer>

<script>
  const WORKER = 'https://polished-truth-9fc2.angus061855.workers.dev';

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(`${WORKER}/posts/${slug}`);
      if (!res.ok) throw new Error();
      const post = await res.json();

      document.title = `${post.title} | AS娛樂`;
      document.getElementById('meta').textContent = post.date;
      document.getElementById('title').textContent = post.title;
      document.getElementById('summary').textContent = post.summary || '';

      const bodyEl = document.getElementById('body');
      const lines = (post.body || '').split('\n');
      let html = '';
      for (const line of lines) {
        const t = line.trim();
        if (!t) { html += '<div style="height:0.6em"></div>'; continue; }
        if (t.match(/^\d+\./)) {
          html += `<p class="list-item">${t}</p>`;
        } else if (t.length <= 25 && !t.endsWith('。') && !t.endsWith('，') && !t.endsWith('、') && !t.match(/^\d/)) {
          html += `<h2>${t}</h2>`;
        } else {
          html += `<p>${t}</p>`;
        }
      }
      bodyEl.innerHTML = html;

      if (post.cover) {
        const img = document.getElementById('cover');
        img.src = post.cover;
        img.style.display = 'block';
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }

  loadPost();
</script>
</body>
</html>
