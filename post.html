  function getBaseViews(slug) { let h=0; for(let i=0;i<slug.length;i++) h=(h*31+slug.charCodeAt(i))&0xffffffff; return 1235+(Math.abs(h)%(4257-1235+1)); }
  function getDailyAdd(slug, days) { let t=0; for(let i=0;i<days;i++){let s=0,str=slug+i; for(let j=0;j<str.length;j++) s=(s*31+str.charCodeAt(j))&0xffffffff; t+=543+(Math.abs(s)%701);} return t; }
  function calcViews(slug, publishDate) { const pub=new Date(publishDate),today=new Date(),days=Math.max(0,Math.floor((today-pub)/(1000*60*60*24))); return (getBaseViews(slug)+getDailyAdd(slug,days)).toLocaleString(); }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function linkifyText(text) {
    const trimmed = text.trim();
    const normalized = trimmed.replace(/[：:]\s*$/, '');
    if (INTERNAL_LINKS[trimmed] || INTERNAL_LINKS[normalized]) {
      const url = INTERNAL_LINKS[trimmed] || INTERNAL_LINKS[normalized];
      return `<a class="related-link" href="${url}" target="_blank" rel="noopener noreferrer">${escapeHtml(normalized)}</a>`;
    }

    const labelUrl = trimmed.match(/^(.+?)[：:]\s*(https?:\/\/\S+)$/);
    if (labelUrl) {
      const label = labelUrl[1].trim();
      const url = labelUrl[2].trim();
      return `<a class="related-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
    }

    return escapeHtml(text).replace(/https?:\/\/[^\s，。)）]+/g, (url) => {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

    for (const line of lines) {
      const t = line.trim();
      if (!t) { html += '<div style="height:0.5em"></div>'; continue; }
      const linked = linkifyText(t);
      if (t.match(/^\d+\./)) { html += `<p class="list-item">${linked}</p>`; }
      else if (t.length <= 25 && !t.endsWith('。') && !t.endsWith('，') && !t.endsWith('、') && !t.match(/^\d/)) { html += `<h2>${linked}</h2>`; }
      else { html += `<p>${linked}</p>`; }
    }
    bodyEl.innerHTML = html;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { showError(); return; }
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4500);
      const res = await fetch(`${WORKER}/posts/${slug}`, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) throw new Error();
      const post = await res.json();

      document.title = `${post.title}｜AS娛樂 大頭`;
      const postUrl = `https://as-ent-tw.com/post.html?slug=${slug}`;

      const schema = document.createElement('script');
      schema.type = 'application/ld+json';
      schema.text = JSON.stringify({
        "@context":"https://schema.org","@type":"Article",
        "headline":post.title,"description":post.summary||'',
        "datePublished":post.date,
        "author":{"@type":"Person","name":"大頭","jobTitle":"八大行業經紀人","url":"https://as-ent-tw.com"},
        "publisher":{"@type":"Organization","name":"AS娛樂","url":"https://as-ent-tw.com"},
        "mainEntityOfPage":{"@type":"WebPage","@id":postUrl}
      });
      document.head.appendChild(schema);

      const breadcrumb = document.createElement('script');
      breadcrumb.type = 'application/ld+json';
      breadcrumb.text = JSON.stringify({
        "@context":"https://schema.org","@type":"BreadcrumbList",
        "itemListElement":[
          {"@type":"ListItem","position":1,"name":"首頁","item":"https://as-ent-tw.com/"},
          {"@type":"ListItem","position":2,"name":"部落格","item":"https://as-ent-tw.com/blog.html"},
          {"@type":"ListItem","position":3,"name":post.title,"item":postUrl}
        ]
      });
      document.head.appendChild(breadcrumb);

      document.querySelector('meta[name="description"]').setAttribute('content', post.summary || post.title);
      document.querySelector('link[rel="canonical"]').setAttribute('href', postUrl);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `${post.title}｜AS娛樂 大頭`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', post.summary || post.title);
      document.querySelector('meta[property="og:url"]').setAttribute('content', postUrl);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${post.title}｜AS娛樂 大頭`);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', post.summary || post.title);

      document.getElementById('meta').textContent = post.date;
      document.getElementById('views').textContent = calcViews(slug, post.date);
      document.getElementById('title').textContent = post.title;
      document.getElementById('summary').textContent = post.summary || '';

      const bodyEl = document.getElementById('body');
      const lines = (post.body || '').split('\n');
      let html = '';
      for (const line of lines) {
        const t = line.trim();
        if (!t) { html += '<div style="height:0.5em"></div>'; continue; }
        const linked = linkifyText(t);
        if (t.match(/^\d+\./)) { html += `<p class="list-item">${linked}</p>`; }
        else if (INTERNAL_LINKS[t] || INTERNAL_LINKS[t.replace(/[：:]\s*$/, '')]) { html += `<p>${linked}</p>`; }
        else if (t.length <= 25 && !t.endsWith('。') && !t.endsWith('，') && !t.endsWith('、') && !t.match(/^\d/)) { html += `<h2>${linked}</h2>`; }
        else { html += `<p>${linked}</p>`; }
      }
      bodyEl.innerHTML = html;

      if (post.cover) {
        const img = document.getElementById('cover');
        img.src = post.cover; img.loading = 'lazy'; img.decoding = 'async'; img.style.display = 'block';
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch {
      if (LOCAL_POSTS[slug]) {
        renderLocalPost(LOCAL_POSTS[slug], slug);
        return;
      }
      showError();
    }
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }

  loadPost();

  (function() {
    const canvas = document.getElementById('velvet-bg');
    const ctx = canvas.getContext('2d');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let t = 0;
    const folds = [{x:0.15,y:0.10,tx:0.75,ty:0.55,speed:0.00002,phase:0.0},{x:0.05,y:0.40,tx:0.60,ty:0.90,speed:0.00002,phase:1.2},{x:0.30,y:0.00,tx:0.95,ty:0.70,speed:0.00002,phase:2.4}];
    function drawFold(f, time) {
      const drift=Math.sin(time*f.speed*1000+f.phase)*0.06;
      const x1=(f.x+drift)*W,y1=(f.y+drift*0.5)*H,x2=(f.tx-drift)*W,y2=(f.ty-drift*0.3)*H;
      const len=Math.hypot(x2-x1,y2-y1),nx=-(y2-y1)/len,ny=(x2-x1)/len;
      const w=Math.max(W,H)*(0.28+Math.sin(time*f.speed*800+f.phase)*0.04);
      const grad=ctx.createLinearGradient(x1+nx*w,y1+ny*w,x1-nx*w,y1-ny*w);
      grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(0.35,'rgba(0,0,0,0)');
      grad.addColorStop(0.48,'rgba(72,70,68,0.08)');grad.addColorStop(0.50,'rgba(95,92,88,0.13)');
      grad.addColorStop(0.52,'rgba(72,70,68,0.08)');grad.addColorStop(0.65,'rgba(0,0,0,0)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save();ctx.beginPath();
      const ex=(x2-x1)/len,ey=(y2-y1)/len,ext=Math.max(W,H)*2;
      ctx.moveTo(x1-ex*ext+nx*w,y1-ey*ext+ny*w);ctx.lineTo(x2+ex*ext+nx*w,y2+ey*ext+ny*w);
      ctx.lineTo(x2+ex*ext-nx*w,y2+ey*ext-ny*w);ctx.lineTo(x1-ex*ext-nx*w,y1-ey*ext-ny*w);
      ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.restore();
    }
    const bumps = [{x:0.55,y:0.35,r:0.42,speed:0.000002,phase:0.0},{x:0.25,y:0.65,r:0.35,speed:0.000002,phase:1.8},{x:0.75,y:0.75,r:0.30,speed:0.000002,phase:3.2}];
    function drawBump(b, time) {
      const drift=Math.sin(time*b.speed*1000+b.phase);
      const cx=(b.x+drift*0.07)*W,cy=(b.y+Math.cos(time*b.speed*800+b.phase)*0.06)*H,r=b.r*Math.max(W,H);
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      grad.addColorStop(0,'rgba(88,85,80,0.20)');grad.addColorStop(0.25,'rgba(65,62,58,0.14)');
      grad.addColorStop(0.55,'rgba(30,28,26,0.07)');grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    }
    function draw() {
      t++;ctx.fillStyle='#060606';ctx.fillRect(0,0,W,H);
      if (!reduceMotion) { bumps.forEach(b=>drawBump(b,t)); folds.forEach(f=>drawFold(f,t)); }
      const v=ctx.createRadialGradient(W*0.5,H*0.45,0,W*0.5,H*0.45,Math.max(W,H)*0.78);
      v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(0.55,'rgba(0,0,0,0.18)');
      v.addColorStop(0.80,'rgba(0,0,0,0.55)');v.addColorStop(1,'rgba(0,0,0,0.85)');
      ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
      if (!document.hidden) requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
